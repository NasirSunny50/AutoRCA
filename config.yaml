# ============================================================================
# AutoRCA Configuration
# ============================================================================
# Edit these values to change behaviour. Secrets (API keys) live in .env.
# ----------------------------------------------------------------------------

monitoring:
  # Folder to watch for incoming log files (relative to project root or absolute)
  watch_dir: "Error Log File"
  # Watch sub-folders too
  recursive: true
  # File extensions that will be analyzed
  extensions: [".log", ".txt", ".out", ".trace"]
  # Seconds a file's size must stay unchanged before it's considered "complete"
  # (prevents reading a file that's still being written to)
  stability_seconds: 2
  # How often (seconds) the folder is re-checked for new/changed files
  # (this runs in addition to instant live filesystem events)
  poll_interval_seconds: 30

processing:
  # Sub-folder (inside watch_dir) where processed log files are moved
  processed_subdir: "processed"
  # Where generated reports are written
  reports_dir: "reports"
  # SQLite database that tracks processing history (for restart recovery)
  db_path: "autorca.db"
  # Max characters of raw log sent to the AI (keeps token usage low & free-tier safe)
  max_excerpt_chars: 16000

ai:
  # Provider: "gemini" | "local" | "heuristic"
  #   gemini    -> Google Gemini free tier (needs GEMINI_API_KEY in .env)
  #   local     -> a model running locally via Ollama (no API key, no internet,
  #                no data leaves the machine). See the local_* settings below.
  #   heuristic -> offline rule engine, no API key, no internet, no model
  provider: "gemini"
  # Gemini model id (free tier). gemini-2.5-flash is current, strong & generous.
  # (Tip: if a model returns HTTP 429 "limit: 0", that model isn't enabled on
  #  your key's project — try gemini-flash-latest or gemini-2.5-flash-lite.)
  model: "gemini-2.5-flash"
  # Request timeout in seconds
  timeout_seconds: 60
  # If the AI call fails, fall back to the offline heuristic engine
  fallback_to_heuristic: true

  # ---- Local model (Ollama) — only used when provider: "local" ----
  # Install Ollama (https://ollama.com/download), then:  ollama pull qwen2.5-coder:7b
  #   - 16 GB+ RAM machine: "qwen2.5-coder:7b"  (best quality)
  #   - tighter RAM / faster: "qwen2.5-coder:3b"
  local_model: "qwen2.5-coder:7b"
  # Where the Ollama server listens
  local_host: "http://localhost:11434"
  # Context window (tokens). Bigger = fits more log, uses more RAM.
  local_num_ctx: 8192
  # Local CPU inference can take minutes per report — keep this generous.
  local_timeout_seconds: 300

# ============================================================================
# Jira integration — the "Create Jira Issue" button on a report
# ----------------------------------------------------------------------------
# Jira Server / Data Center. Secrets live in .env:
#   JIRA_BASE_URL, JIRA_USERNAME, JIRA_PASSWORD
# ============================================================================
jira:
  # Map each AutoRCA project (watch-dir sub-folder) to its Jira project KEY.
  project_map:
    Nagad: "DFS"           # KSL_R&D-DigitalFinancialServices-Nagad
    MBL Rainbow: "RAINBOW" # KSL_R&D-KonaPay_MBL Rainbow
    NexusPay: "KONAPAY"    # KSL_R&D-KonaPay-DBBL-Bangladesh
  # Assignees — name / username / email (resolved via Jira user search).
  #   Application-level issues -> assignee_application
  #   Server/DB/Network/External/Configuration ("service") -> assignee_service
  assignee_application: "Sumit Saha Sourav"   # Application issues
  assignee_service: "Md. Iqbal Hossain"       # service issues
  # Issue type names exactly as they appear in your Jira projects.
  bug_type: "Bug"
  improvement_type: "Improvement"
  # Set to false only if the Jira server uses a self-signed TLS certificate.
  verify_ssl: true

logging:
  level: "INFO"            # DEBUG | INFO | WARNING | ERROR
  file: "autorca_service.log"
