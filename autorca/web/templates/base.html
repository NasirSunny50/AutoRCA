<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AutoRCA{% endblock %} · AutoRCA Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ asset_version }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
  <script>
    // Apply saved theme before paint to avoid a flash.
    (function(){ try { var t = localStorage.getItem('autorca-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t); } catch(e){} })();
  </script>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="topbar">
    <div class="inner">
      <a href="{{ url_for('dashboard') }}" class="brand">
        <span class="logo">🔍</span>
        <span>AutoRCA<small>Log Analysis Portal</small></span>
      </a>
      <nav class="nav">
        <a href="{{ url_for('dashboard') }}" class="{{ 'active' if active=='dashboard' }}">Dashboard</a>
        <a href="{{ url_for('reports') }}" class="{{ 'active' if active=='reports' }}">All Reports</a>
        {% if health_checker_url %}
        <a href="{{ health_checker_url }}" target="_blank" rel="noopener" class="nav-hc"
           title="Open the CMS Health Checker in a new tab">🩺 Health Checker <span class="ext">↗</span></a>
        {% endif %}
        <label class="engine-pick" title="AI model used for new analyses">
          <span class="engine-ic">🧠</span>
          <select id="engineSelect" aria-label="Model selection">
            {% for o in engine_options %}
              <option value="{{ o.id }}" {{ 'selected' if o.id == active_engine.id }}>{{ o.label }}</option>
            {% endfor %}
            {% if active_engine.id == 'custom' %}
              <option value="custom" selected>{{ active_engine.label }}</option>
            {% endif %}
          </select>
        </label>
        <button id="themeBtn" class="theme-toggle" type="button" title="Toggle light / dark mode" aria-label="Toggle theme">
          <span class="ic-dark">🌙</span><span class="ic-light">☀️</span>
        </button>
      </nav>
    </div>
  </div>
  <div class="wrap">
    {% block content %}{% endblock %}
    <div class="foot">AutoRCA — Automated Log Monitoring &amp; Error Analysis · Kona Software Lab LTD</div>
  </div>
  <div id="engineToast" class="engine-toast" role="status" aria-live="polite"></div>
  <script>
    (function(){
      var btn = document.getElementById('themeBtn');
      if(!btn) return;
      btn.addEventListener('click', function(){
        var cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', cur);
        try { localStorage.setItem('autorca-theme', cur); } catch(e){}
      });
    })();
  </script>
  <script>
    // Model selection: switch the active AI engine for new analyses.
    (function(){
      var sel = document.getElementById('engineSelect');
      var toast = document.getElementById('engineToast');
      if(!sel) return;
      var toastTimer;
      function showToast(msg, ok){
        if(!toast) return;
        toast.textContent = msg;
        toast.className = 'engine-toast show' + (ok === false ? ' err' : '');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function(){ toast.className = 'engine-toast'; }, 3800);
      }
      sel.addEventListener('change', function(){
        var id = sel.value;
        sel.disabled = true;
        fetch('{{ url_for("api_set_provider") }}', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({engine: id})
        })
        .then(function(r){ return r.json(); })
        .then(function(d){
          sel.disabled = false;
          if(d.ok){ showToast('Switched to ' + d.engine.label + ' — applies to new analyses', true); }
          else { showToast('Switch failed: ' + (d.error || 'error'), false); }
        })
        .catch(function(){ sel.disabled = false; showToast('Switch failed (network)', false); });
      });
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
